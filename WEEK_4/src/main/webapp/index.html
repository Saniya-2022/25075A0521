<!DOCTYPE html>
<html>
<head>
    <title>Weather Forecast Graph</title>

    <!-- Chart.js REQUIRED -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        #error {
            color: red;
        }
    </style>
</head>
<body>

<h2>Weather Forecast Graph</h2>

<input type="text" id="city" placeholder="Enter city name">
<button id="btn">Get Weather</button>

<p id="error"></p>

<canvas id="chart" width="600" height="300"></canvas>

<!-- 🔥 CORRECT PATH -->
<script src="js/index.js"></script>

</body>
</html>
