<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:350px;">
    <h3 class="text-center">Register</h3>

    <input id="regUser" class="form-control mt-3" placeholder="Username">
    <input id="regPass" type="password" class="form-control mt-2" placeholder="Password">
    <input id="regConfirm" type="password" class="form-control mt-2" placeholder="Confirm Password">

    <button onclick="registerUser()" class="btn btn-primary mt-3 w-100">Register</button>
</div>

<script src="app.js"></script>
</body>
</html>
