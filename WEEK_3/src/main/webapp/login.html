<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:350px;">
    <h3 class="text-center">Login</h3>

    <input id="loginUser" class="form-control mt-3" placeholder="Username">
    <input id="loginPass" type="password" class="form-control mt-2" placeholder="Password">

    <button onclick="loginUser()" class="btn btn-success mt-3 w-100">Login</button>

    <p class="text-center mt-2">
        New user? <a href="register.html">Register</a>
    </p>
</div>

<script src="app.js"></script>
</body>
</html>
