<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar bg-dark px-3">
    <span class="text-white">Shopping Cart</span>
    <a href="cart.html" class="btn btn-warning">Cart</a>
</nav>

<div class="container mt-4">
    <div class="row g-3">

        <div class="col-md-3">
            <div class="card p-3">
                <img src="https://m.media-amazon.com/images/I/61utX8kBDlL._UY695_.jpg">
                <h5>Running Shoes</h5>
                <p>₹1200</p>
                <button onclick="addToCart(1)" class="btn btn-success">Add to Cart</button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <img src="https://m.media-amazon.com/images/I/61y2VVWcGBL._SX679_.jpg">
                <h5>Smart Watch</h5>
                <p>₹2500</p>
                <button onclick="addToCart(2)" class="btn btn-success">Add to Cart</button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <img src="https://m.media-amazon.com/images/I/81fPKd-2AYL._UY741_.jpg">
                <h5>Backpack</h5>
                <p>₹800</p>
                <button onclick="addToCart(3)" class="btn btn-success">Add to Cart</button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._SX679_.jpg">
                <h5>Headphones</h5>
                <p>₹1500</p>
                <button onclick="addToCart(4)" class="btn btn-success">Add to Cart</button>
            </div>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
