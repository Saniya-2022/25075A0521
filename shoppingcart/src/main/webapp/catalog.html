<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h3>Shopping Cart</h3>
    <a href="cart.html" style="color:white;">Cart</a>
</div>

<!-- PRODUCTS -->
<div class="products">

    <!-- PRODUCT 1 -->
    <div class="product-card">
        <img src="https://m.media-amazon.com/images/I/61utX8kBDlL._UY695_.jpg" alt="Shoes">
        <h3>Running Shoes</h3>
        <p>₹1200</p>
        <button onclick="addToCart(1)">Add to Cart</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product-card">
        <img src="https://m.media-amazon.com/images/I/61y2VVWcGBL._SX679_.jpg" alt="Watch">
        <h3>Smart Watch</h3>
        <p>₹2500</p>
        <button onclick="addToCart(2)">Add to Cart</button>
    </div>

    <!-- PRODUCT 3 -->
    <div class="product-card">
        <img src="https://m.media-amazon.com/images/I/81fPKd-2AYL._UY741_.jpg" alt="Bag">
        <h3>Backpack</h3>
        <p>₹800</p>
        <button onclick="addToCart(3)">Add to Cart</button>
    </div>

    <!-- PRODUCT 4 -->
    <div class="product-card">
        <img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._SX679_.jpg" alt="Headphones">
        <h3>Headphones</h3>
        <p>₹1500</p>
        <button onclick="addToCart(4)">Add to Cart</button>
    </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
