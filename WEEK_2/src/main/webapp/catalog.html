<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Shopping Cart</span>
    <a href="cart.html" class="btn btn-warning">Cart</a>
</nav>

<!-- PRODUCTS -->
<div class="container mt-4">
    <div class="row g-4">

        <!-- PRODUCT 1 -->
        <div class="col-md-3">
            <div class="card h-100 text-center shadow">
                <img src="https://m.media-amazon.com/images/I/61utX8kBDlL._UY695_.jpg" class="card-img-top p-3" style="height:200px; object-fit:contain;">
                <div class="card-body">
                    <h5>Running Shoes</h5>
                    <p>₹1200</p>
                    <button class="btn btn-success w-100" onclick="addToCart(1)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="col-md-3">
            <div class="card h-100 text-center shadow">
                <img src="https://m.media-amazon.com/images/I/61y2VVWcGBL._SX679_.jpg" class="card-img-top p-3" style="height:200px; object-fit:contain;">
                <div class="card-body">
                    <h5>Smart Watch</h5>
                    <p>₹2500</p>
                    <button class="btn btn-success w-100" onclick="addToCart(2)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="col-md-3">
            <div class="card h-100 text-center shadow">
                <img src="https://m.media-amazon.com/images/I/81fPKd-2AYL._UY741_.jpg" class="card-img-top p-3" style="height:200px; object-fit:contain;">
                <div class="card-body">
                    <h5>Backpack</h5>
                    <p>₹800</p>
                    <button class="btn btn-success w-100" onclick="addToCart(3)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="col-md-3">
            <div class="card h-100 text-center shadow">
                <img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._SX679_.jpg" class="card-img-top p-3" style="height:200px; object-fit:contain;">
                <div class="card-body">
                    <h5>Headphones</h5>
                    <p>₹1500</p>
                    <button class="btn btn-success w-100" onclick="addToCart(4)">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
